<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" stroke="#edebe9" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" fill="#0078d4" rx="4"/>
  <text x="200" y="45" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Complete Mini-Packs Bundle</text>
  
  <!-- Main Content Area -->
  <rect x="30" y="80" width="340" height="180" fill="white" stroke="#edebe9" stroke-width="1" rx="4"/>
  
  <!-- Bundle Badge -->
  <rect x="150" y="95" width="100" height="25" fill="#0078d4" rx="12"/>
  <text x="200" y="112" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">SAVE $18</text>
  
  <!-- Three Product Icons -->
  <rect x="60" y="130" width="80" height="60" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="4"/>
  <text x="100" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">📋</text>
  <text x="100" y="175" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">Sheet Setup</text>
  <text x="100" y="185" text-anchor="middle" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="8">$29 value</text>
  
  <rect x="160" y="130" width="80" height="60" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="4"/>
  <text x="200" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">⚡</text>
  <text x="200" y="175" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">MEP Tools</text>
  <text x="200" y="185" text-anchor="middle" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="8">$39 value</text>
  
  <rect x="260" y="130" width="80" height="60" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="4"/>
  <text x="300" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">✓</text>
  <text x="300" y="175" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">QC Suite</text>
  <text x="300" y="185" text-anchor="middle" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="8">$39 value</text>
  
  <!-- Plus Signs -->
  <text x="145" y="165" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600">+</text>
  <text x="245" y="165" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600">+</text>
  
  <!-- Original Price -->
  <text x="100" y="220" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="14" font-weight="500" text-decoration="line-through">$107</text>
  
  <!-- Bundle Price -->
  <text x="170" y="220" fill="#323130" font-family="Segoe UI, sans-serif" font-size="16" font-weight="500">Bundle Price:</text>
  <text x="320" y="240" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">$89</text>
</svg>