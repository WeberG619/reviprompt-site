<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" stroke="#edebe9" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" fill="#0078d4" rx="4"/>
  <text x="200" y="45" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">QC Professional Suite</text>
  
  <!-- Main Content Area -->
  <rect x="30" y="80" width="340" height="180" fill="white" stroke="#edebe9" stroke-width="1" rx="4"/>
  
  <!-- QC Dashboard -->
  <rect x="50" y="100" width="120" height="80" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="4"/>
  <text x="110" y="120" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Model Auditor</text>
  
  <!-- Check Items -->
  <circle cx="70" cy="135" r="3" fill="#0078d4"/>
  <text x="80" y="140" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9">Elements: 1,247</text>
  
  <circle cx="70" cy="150" r="3" fill="#0078d4"/>
  <text x="80" y="155" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9">Warnings: 12</text>
  
  <circle cx="70" cy="165" r="3" fill="#0078d4"/>
  <text x="80" y="170" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9">Missing: 3</text>
  
  <!-- Chart Area -->
  <rect x="200" y="100" width="150" height="80" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="4"/>
  <text x="275" y="120" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Issue Tracking</text>
  
  <!-- Bar Chart -->
  <rect x="220" y="140" width="15" height="30" fill="#0078d4"/>
  <rect x="240" y="150" width="15" height="20" fill="#0078d4"/>
  <rect x="260" y="135" width="15" height="35" fill="#0078d4"/>
  <rect x="280" y="145" width="15" height="25" fill="#0078d4"/>
  <rect x="300" y="155" width="15" height="15" fill="#0078d4"/>
  
  <!-- Report Export -->
  <rect x="50" y="200" width="80" height="30" fill="#0078d4" rx="4"/>
  <text x="90" y="220" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Export Report</text>
  
  <!-- Categories -->
  <text x="180" y="210" fill="#323130" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">7-Category Audit</text>
  <text x="180" y="225" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">Complete model validation</text>
  
  <!-- Price -->
  <text x="320" y="240" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">$39</text>
</svg>