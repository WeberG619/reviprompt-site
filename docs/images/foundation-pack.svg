<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" stroke="#edebe9" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" fill="#0078d4" rx="4"/>
  <text x="200" y="45" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Foundation Pack</text>
  
  <!-- Main Content Area -->
  <rect x="30" y="80" width="340" height="180" fill="white" stroke="#edebe9" stroke-width="1" rx="4"/>
  
  <!-- Popular Badge -->
  <rect x="150" y="95" width="100" height="25" fill="#0078d4" rx="12"/>
  <text x="200" y="112" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">POPULAR</text>
  
  <!-- AI Prompts Grid -->
  <rect x="50" y="130" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="2"/>
  <text x="80" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">🤖</text>
  
  <rect x="120" y="130" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="2"/>
  <text x="150" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">📐</text>
  
  <rect x="190" y="130" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="2"/>
  <text x="220" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">♿</text>
  
  <rect x="260" y="130" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="2"/>
  <text x="290" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16">🔄</text>
  
  <rect x="330" y="130" width="30" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="1" rx="2"/>
  <text x="345" y="155" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="12">+</text>
  
  <!-- Feature Labels -->
  <text x="80" y="185" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9" font-weight="500">AI Prompts</text>
  <text x="150" y="185" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9" font-weight="500">Dynamo</text>
  <text x="220" y="185" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9" font-weight="500">IBC/ADA</text>
  <text x="290" y="185" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="9" font-weight="500">Backup</text>
  
  <!-- Count Badge -->
  <rect x="60" y="200" width="80" height="20" fill="#0078d4" rx="10"/>
  <text x="100" y="213" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600">25 Prompts</text>
  
  <!-- Features -->
  <text x="180" y="210" fill="#323130" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">Essential AEC Tools</text>
  <text x="180" y="225" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">6 months updates included</text>
  
  <!-- Price -->
  <text x="320" y="240" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">$39</text>
