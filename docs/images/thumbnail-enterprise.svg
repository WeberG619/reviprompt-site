<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Background Pattern (Building/Enterprise symbols) -->
  <g opacity="0.1">
    <rect x="80" y="60" width="25" height="40" fill="none" stroke="white" stroke-width="2"/>
    <rect x="85" y="65" width="3" height="5" fill="white"/>
    <rect x="90" y="65" width="3" height="5" fill="white"/>
    <rect x="95" y="65" width="3" height="5" fill="white"/>
    <rect x="85" y="75" width="3" height="5" fill="white"/>
    <rect x="90" y="75" width="3" height="5" fill="white"/>
    <rect x="95" y="75" width="3" height="5" fill="white"/>
    
    <rect x="200" y="80" width="30" height="50" fill="none" stroke="white" stroke-width="2"/>
    <rect x="400" y="70" width="20" height="35" fill="none" stroke="white" stroke-width="2"/>
    <rect x="600" y="90" width="35" height="45" fill="none" stroke="white" stroke-width="2"/>
    <rect x="800" y="60" width="25" height="40" fill="none" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Main Content Card -->
  <rect x="60" y="80" width="1160" height="560" fill="url(#cardGradient)" rx="20" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Enterprise Building Complex -->
  <g transform="translate(100, 150)">
    <!-- Main Building -->
    <rect x="0" y="0" width="120" height="200" fill="#1e40af" rx="8"/>
    <!-- Windows -->
    <rect x="15" y="20" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="45" y="20" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="75" y="20" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="15" y="60" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="45" y="60" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="75" y="60" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="15" y="100" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="45" y="100" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="75" y="100" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="15" y="140" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="45" y="140" width="20" height="25" fill="white" opacity="0.9"/>
    <rect x="75" y="140" width="20" height="25" fill="white" opacity="0.9"/>
    
    <!-- Side Buildings -->
    <rect x="-40" y="50" width="30" height="150" fill="#3730a3" rx="5"/>
    <rect x="130" y="30" width="35" height="170" fill="#3730a3" rx="5"/>
    
    <!-- Connection Network Lines -->
    <line x1="60" y1="100" x2="180" y2="80" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    <line x1="60" y1="120" x2="180" y2="120" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    <line x1="60" y1="140" x2="180" y2="160" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
    
    <!-- Network Nodes -->
    <circle cx="185" cy="75" r="6" fill="#f59e0b"/>
    <circle cx="185" cy="115" r="6" fill="#f59e0b"/>
    <circle cx="185" cy="165" r="6" fill="#f59e0b"/>
  </g>
  
  <!-- Arrow -->
  <polygon points="420,300 480,280 480,295 550,295 550,305 480,305 480,320" fill="#22c55e"/>
  
  <!-- Results Section -->
  <rect x="600" y="200" width="500" height="300" fill="#dcfce7" rx="15" stroke="#22c55e" stroke-width="3"/>
  <text x="620" y="235" fill="#15803d" font-family="Arial, sans-serif" font-size="28" font-weight="bold">ENTERPRISE RESULTS:</text>
  
  <text x="620" y="270" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="bold">✓ 150+ Complete Prompt Library</text>
  <text x="620" y="300" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="bold">✓ MEP + Structural + QC Tools</text>
  <text x="620" y="330" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="bold">✓ Commercial License (10 Users)</text>
  <text x="620" y="360" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="bold">✓ Priority Support + Training</text>
  <text x="620" y="390" fill="#166534" font-family="Arial, sans-serif" font-size="20" font-weight="bold">✓ Team Deployment Ready</text>
  
  <rect x="620" y="420" width="200" height="60" fill="#22c55e" rx="10"/>
  <text x="720" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">COMPLETE SOLUTION</text>
  <text x="720" y="460" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">$299</text>
  
  <!-- Title -->
  <text x="640" y="130" fill="#1e40af" font-family="Arial, sans-serif" font-size="56" font-weight="bold">Enterprise Pack</text>
  <text x="640" y="170" fill="#64748b" font-family="Arial, sans-serif" font-size="24">Transform Your Entire Team's Workflow</text>
</svg>