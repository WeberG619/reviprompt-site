<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" stroke="#edebe9" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" fill="#0078d4" rx="4"/>
  <text x="200" y="45" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Sheet Setup Starter</text>
  
  <!-- Main Content Area -->
  <rect x="30" y="80" width="340" height="180" fill="white" stroke="#edebe9" stroke-width="1" rx="4"/>
  
  <!-- Sheet Icons -->
  <rect x="50" y="100" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="2"/>
  <text x="80" y="125" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">A-001</text>
  
  <rect x="130" y="100" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="2"/>
  <text x="160" y="125" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">A-101</text>
  
  <rect x="210" y="100" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="2"/>
  <text x="240" y="125" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">A-201</text>
  
  <rect x="290" y="100" width="60" height="40" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="2"/>
  <text x="320" y="125" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">A-301</text>
  
  <!-- Excel Icon -->
  <rect x="50" y="160" width="30" height="30" fill="#0078d4" rx="2"/>
  <text x="65" y="180" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">XLS</text>
  
  <!-- Arrow -->
  <path d="M90 175 L120 175 M115 170 L120 175 L115 180" stroke="#0078d4" stroke-width="2" fill="none"/>
  
  <!-- Feature Text -->
  <text x="140" y="170" fill="#323130" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">Excel Import/Export</text>
  <text x="140" y="185" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">Batch rename 100+ sheets</text>
  
  <!-- Bottom Badge -->
  <rect x="140" y="220" width="120" height="25" fill="#0078d4" rx="12"/>
  <text x="200" y="237" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">C# Source Included</text>
  
  <!-- Price -->
  <text x="320" y="240" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">$29</text>
</svg>