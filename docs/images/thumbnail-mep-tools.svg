<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Background Pattern (Electrical symbols) -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="20" fill="none" stroke="white" stroke-width="2"/>
    <line x1="80" y1="100" x2="120" y2="100" stroke="white" stroke-width="2"/>
    <circle cx="300" cy="200" r="15" fill="none" stroke="white" stroke-width="2"/>
    <rect x="480" y="80" width="30" height="20" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="700" cy="150" r="25" fill="none" stroke="white" stroke-width="2"/>
    <line x1="680" y1="130" x2="720" y2="170" stroke="white" stroke-width="2"/>
    <line x1="720" y1="130" x2="680" y2="170" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Main Content Card -->
  <rect x="60" y="80" width="1160" height="560" fill="url(#cardGradient)" rx="20" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- MEP Equipment Icons -->
  <rect x="100" y="120" width="80" height="60" fill="#f39c12" rx="8"/>
  <text x="140" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">PANEL</text>
  <text x="140" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">EP-001</text>
  
  <circle cx="240" cy="150" r="30" fill="#e74c3c"/>
  <text x="240" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">XFMR</text>
  
  <rect x="300" y="130" width="60" height="40" fill="#3498db" rx="6"/>
  <text x="330" y="145" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">AHU</text>
  <text x="330" y="158" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">-01</text>
  
  <!-- Arrow and Auto-Tag Magic -->
  <path d="M400 150 L500 150 M480 130 L500 150 L480 170" stroke="#8b5cf6" stroke-width="6" fill="none"/>
  <text x="450" y="130" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AUTO-TAG</text>
  
  <!-- Tagged Equipment -->
  <rect x="520" y="120" width="90" height="60" fill="#f39c12" rx="8" stroke="#22c55e" stroke-width="3"/>
  <text x="565" y="140" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">PANEL</text>
  <text x="565" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">EP-001</text>
  <rect x="620" y="110" width="60" height="25" fill="#22c55e" rx="4"/>
  <text x="650" y="127" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">EP-001</text>
  
  <!-- Main Title -->
  <text x="100" y="260" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="48" font-weight="900">
    AUTO-TAG 500+
  </text>
  <text x="100" y="320" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="48" font-weight="900">
    MEP EQUIPMENT
  </text>
  <text x="100" y="370" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="32" font-weight="700">
    IN 20 MINUTES!
  </text>
  
  <!-- NEC Compliance Badge -->
  <rect x="100" y="400" width="300" height="80" fill="#22c55e" rx="10"/>
  <text x="110" y="430" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ NEC COMPLIANT</text>
  <text x="110" y="455" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ LOAD CALCULATIONS</text>
  <text x="110" y="480" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ PROFESSIONAL REPORTS</text>
  
  <!-- Equipment Types -->
  <rect x="750" y="120" width="400" height="180" fill="#f8fafc" rx="10" stroke="#8b5cf6" stroke-width="2"/>
  <text x="760" y="150" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="20" font-weight="bold">SUPPORTS ALL EQUIPMENT:</text>
  
  <g fill="#4a5568" font-family="Arial, sans-serif" font-size="16">
    <text x="770" y="180">⚡ Electrical Panels & Switchgear</text>
    <text x="770" y="200">🔌 Transformers & Motor Controls</text>
    <text x="770" y="220">❄️ HVAC Units & Equipment</text>
    <text x="770" y="240">💧 Pumps & Plumbing Fixtures</text>
    <text x="770" y="260">🔥 Fire Protection Systems</text>
    <text x="770" y="280">📊 Excel Integration & Reports</text>
  </g>
  
  <!-- Results Statistics -->
  <rect x="750" y="330" width="400" height="150" fill="#fef3c7" rx="10" stroke="#f59e0b" stroke-width="2"/>
  <text x="760" y="360" fill="#92400e" font-family="Arial, sans-serif" font-size="18" font-weight="bold">REAL PROJECT RESULTS:</text>
  
  <g fill="#78350f" font-family="Arial, sans-serif">
    <text x="770" y="390" font-size="16" font-weight="bold">Hospital Project: 500+ Equipment</text>
    <text x="770" y="415" font-size="20" font-weight="900">Manual: 2 Days → Automated: 20 Min</text>
    <text x="770" y="440" font-size="18" font-weight="bold">94% Time Savings</text>
    <text x="770" y="465" font-size="16">Zero naming errors, 100% coverage</text>
  </g>
  
  <!-- MEP Tools Badge -->
  <rect x="450" y="400" width="260" height="80" fill="#8b5cf6" rx="10"/>
  <text x="580" y="430" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">MEP POWER TOOLS</text>
  <text x="580" y="455" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">Professional MEP Automation</text>
  <text x="580" y="475" text-anchor="middle" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14">ReviPrompt Lab</text>
  
  <!-- Bottom Features -->
  <rect x="100" y="520" width="600" height="80" fill="rgba(139,92,246,0.1)" rx="10"/>
  <text x="110" y="550" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">✓ Works with Revit 2024-2026</text>
  <text x="110" y="575" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">✓ Professional C# add-in with full source code</text>
  
  <!-- Play Button Overlay -->
  <circle cx="950" cy="450" r="45" fill="rgba(255,255,255,0.95)" stroke="#8b5cf6" stroke-width="4"/>
  <path d="M930 430 L930 470 L970 450 Z" fill="#8b5cf6"/>
</svg>