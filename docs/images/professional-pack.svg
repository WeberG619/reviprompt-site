  <text x="135" y="175" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="8">MEP</text>
  
  <rect x="170" y="130" width="50" height="50" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="4"/>
  <text x="195" y="160" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="20">🏗️</text>
  <text x="195" y="175" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="8">STRUCT</text>
  
  <rect x="230" y="130" width="50" height="50" fill="#f3f9ff" stroke="#0078d4" stroke-width="2" rx="4"/>
