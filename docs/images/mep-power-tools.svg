<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" stroke="#edebe9" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" fill="#0078d4" rx="4"/>
  <text x="200" y="45" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">MEP Power Tools</text>
  
  <!-- Main Content Area -->
  <rect x="30" y="80" width="340" height="180" fill="white" stroke="#edebe9" stroke-width="1" rx="4"/>
  
  <!-- MEP Equipment Icons -->
  <circle cx="80" cy="120" r="20" fill="#f3f9ff" stroke="#0078d4" stroke-width="2"/>
  <text x="80" y="127" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">⚡</text>
  
  <circle cx="160" cy="120" r="20" fill="#f3f9ff" stroke="#0078d4" stroke-width="2"/>
  <text x="160" y="127" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">🔧</text>
  
  <circle cx="240" cy="120" r="20" fill="#f3f9ff" stroke="#0078d4" stroke-width="2"/>
  <text x="240" y="127" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">🏭</text>
  
  <circle cx="320" cy="120" r="20" fill="#f3f9ff" stroke="#0078d4" stroke-width="2"/>
  <text x="320" y="127" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">📊</text>
  
  <!-- Feature Labels -->
  <text x="80" y="155" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">Auto-Tag</text>
  <text x="160" y="155" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">Load Calc</text>
  <text x="240" y="155" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">Systems</text>
  <text x="320" y="155" text-anchor="middle" fill="#323130" font-family="Segoe UI, sans-serif" font-size="10" font-weight="500">Reports</text>
  
  <!-- Connection Lines -->
  <line x1="100" y1="120" x2="140" y2="120" stroke="#0078d4" stroke-width="2"/>
  <line x1="180" y1="120" x2="220" y2="120" stroke="#0078d4" stroke-width="2"/>
  <line x1="260" y1="120" x2="300" y2="120" stroke="#0078d4" stroke-width="2"/>
  
  <!-- NEC Compliance Badge -->
  <rect x="50" y="190" width="100" height="25" fill="#0078d4" rx="12"/>
  <text x="100" y="207" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">NEC Compliant</text>
  
  <!-- Equipment Count -->
  <text x="200" y="200" fill="#323130" font-family="Segoe UI, sans-serif" font-size="12" font-weight="500">Equipment Tagger</text>
  <text x="200" y="215" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">Auto-tag all MEP equipment</text>
  
  <!-- Price -->
  <text x="320" y="240" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">$39</text>
</svg>