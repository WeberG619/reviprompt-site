<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)" stroke="#edebe9" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="20" y="20" width="360" height="40" fill="#0078d4" rx="4"/>
  <text x="200" y="45" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Enterprise Pack</text>
  
  <!-- Main Content Area -->
  <rect x="30" y="80" width="340" height="180" fill="white" stroke="#edebe9" stroke-width="1" rx="4"/>
  
  <!-- Building Icons (Team/Enterprise) -->
  <rect x="60" y="100" width="30" height="50" fill="#0078d4" rx="2"/>
  <rect x="65" y="110" width="5" height="8" fill="white"/>
  <rect x="75" y="110" width="5" height="8" fill="white"/>
  <rect x="65" y="125" width="5" height="8" fill="white"/>
  <rect x="75" y="125" width="5" height="8" fill="white"/>
  
  <rect x="110" y="100" width="30" height="50" fill="#0078d4" rx="2"/>
  <rect x="115" y="110" width="5" height="8" fill="white"/>
  <rect x="125" y="110" width="5" height="8" fill="white"/>
  <rect x="115" y="125" width="5" height="8" fill="white"/>
  <rect x="125" y="125" width="5" height="8" fill="white"/>
  
  <rect x="160" y="100" width="30" height="50" fill="#0078d4" rx="2"/>
  <rect x="165" y="110" width="5" height="8" fill="white"/>
  <rect x="175" y="110" width="5" height="8" fill="white"/>
  <rect x="165" y="125" width="5" height="8" fill="white"/>
  <rect x="175" y="125" width="5" height="8" fill="white"/>
  
  <!-- Connection Lines (Network) -->
  <line x1="90" y1="125" x2="110" y2="125" stroke="#22c55e" stroke-width="2"/>
  <line x1="140" y1="125" x2="160" y2="125" stroke="#22c55e" stroke-width="2"/>
  
  <!-- Feature Text -->
  <text x="50" y="175" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">150+ Prompts</text>
  <text x="50" y="190" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">Complete Library</text>
  
  <text x="140" y="175" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">10 Users</text>
  <text x="140" y="190" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">Commercial License</text>
  
  <text x="230" y="175" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600">Priority Support</text>
  <text x="230" y="190" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">Team Training</text>
  
  <!-- Tools Icons -->
  <rect x="220" y="105" width="60" height="35" fill="#f3f9ff" stroke="#22c55e" stroke-width="1" rx="3"/>
  <text x="250" y="125" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600">MEP + QC</text>
  
  <rect x="300" y="105" width="60" height="35" fill="#f3f9ff" stroke="#22c55e" stroke-width="1" rx="3"/>
  <text x="330" y="125" text-anchor="middle" fill="#22c55e" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600">STRUCT</text>
  
  <!-- Price Badge -->
  <rect x="310" y="200" width="60" height="25" fill="#0078d4" rx="12"/>
  <text x="340" y="217" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">$299</text>
  
  <!-- Team Icon -->
  <circle cx="80" cy="210" r="8" fill="#22c55e"/>
  <text x="80" y="215" text-anchor="middle" fill="white" font-family="Segoe UI, sans-serif" font-size="8" font-weight="600">10</text>
  
  <circle cx="100" cy="210" r="6" fill="#0078d4"/>
  <circle cx="115" cy="210" r="6" fill="#0078d4"/>
  <circle cx="130" cy="210" r="6" fill="#0078d4"/>
  
  <text x="145" y="215" fill="#605e5c" font-family="Segoe UI, sans-serif" font-size="10">+ more users</text>
  
  <!-- Bottom Label -->
  <text x="200" y="245" text-anchor="middle" fill="#0078d4" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600">Complete Solution for Teams</text>
</svg>