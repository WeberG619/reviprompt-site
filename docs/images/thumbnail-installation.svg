<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#106ebe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Background Pattern -->
  <pattern id="pattern" patternUnits="userSpaceOnUse" width="100" height="100">
    <circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/>
  </pattern>
  <rect width="1280" height="720" fill="url(#pattern)"/>
  
  <!-- Main Content Card -->
  <rect x="80" y="120" width="1120" height="480" fill="url(#cardGradient)" rx="20" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Revit Logo Area -->
  <rect x="120" y="160" width="200" height="120" fill="#f39c12" rx="10"/>
  <text x="220" y="210" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">REVIT</text>
  <text x="220" y="240" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">2024-2026</text>
  
  <!-- Arrow -->
  <path d="M350 220 L450 220 M430 200 L450 220 L430 240" stroke="#0078d4" stroke-width="8" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Installation Icon -->
  <circle cx="550" cy="220" r="60" fill="#22c55e" stroke="white" stroke-width="4"/>
  <path d="M520 220 L540 240 L580 200" stroke="white" stroke-width="6" fill="none"/>
  
  <!-- Main Title -->
  <text x="640" y="200" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="48" font-weight="900">
    INSTALL REVIT
  </text>
  <text x="640" y="260" fill="#1a1a1a" font-family="Arial, sans-serif" font-size="48" font-weight="900">
    ADD-INS IN 5 MIN
  </text>
  
  <!-- Subtitle -->
  <text x="640" y="320" fill="#4a5568" font-family="Arial, sans-serif" font-size="24" font-weight="600">
    Step-by-Step Professional Installation Guide
  </text>
  
  <!-- Bottom Features -->
  <rect x="120" y="380" width="280" height="180" fill="rgba(0,120,212,0.1)" rx="10"/>
  <text x="130" y="410" fill="#0078d4" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ Works with Revit 2024-2026</text>
  <text x="130" y="440" fill="#0078d4" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ Administrator Setup</text>
  <text x="130" y="470" fill="#0078d4" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ Troubleshooting Tips</text>
  <text x="130" y="500" fill="#0078d4" font-family="Arial, sans-serif" font-size="18" font-weight="bold">✓ Professional Tools Ready</text>
  
  <!-- Time Badge -->
  <rect x="920" y="380" width="240" height="80" fill="#ff6b35" rx="15"/>
  <text x="1040" y="410" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">ONLY</text>
  <text x="1040" y="440" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="900">5 MINUTES</text>
  
  <!-- ReviPrompt Lab Logo -->
  <rect x="920" y="480" width="240" height="60" fill="#1a1a1a" rx="10"/>
  <text x="1040" y="510" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">ReviPrompt Lab</text>
  <text x="1040" y="530" text-anchor="middle" fill="#4fc3f7" font-family="Arial, sans-serif" font-size="14">Professional Tools</text>
  
  <!-- Play Button Overlay -->
  <circle cx="640" cy="360" r="40" fill="rgba(255,255,255,0.9)" stroke="#0078d4" stroke-width="3"/>
  <path d="M625 345 L625 375 L655 360 Z" fill="#0078d4"/>
</svg>